<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Import Portal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/pages/dashboard.css">
</head>
<body>
    <div class="app-shell">
        <div class="sidebar-wrapper" data-include="../components/sidebar.html"></div>
        
        <main class="main">
            <div class="header-wrapper" data-include="../components/header.html"></div>

            <section class="content">
                <h2 class="page-title">Dashboard</h2>

                <div class="welcome-banner">
                    <div class="banner-text">
                        <strong>Chào mừng, Admin!</strong>
                        <p>Bạn đã đăng nhập thành công hệ thống Import Portal.</p>
                    </div>
                </div>

                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-info">
                            <span class="stat-label">Hồ sơ đang xử lý</span>
                            <span class="stat-number">80</span>
                        </div>
                        <div class="stat-icon icon-blue">
                            <i class="fas fa-file-invoice"></i>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-info">
                            <span class="stat-label">Tổng số hồ sơ</span>
                            <span class="stat-number">92</span>
                        </div>
                        <div class="stat-icon icon-green">
                            <i class="fas fa-check-circle"></i>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-info">
                            <span class="stat-label">Tổng người dùng</span>
                            <span class="stat-number">8</span>
                        </div>
                        <div class="stat-icon icon-orange">
                            <i class="fas fa-users"></i>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-info">
                            <span class="stat-label">Thông báo</span>
                            <div class="stat-number-wrap">
                                <span class="stat-number">122</span>
                                <span class="badge-red">22 chưa đọc</span>
                            </div>
                        </div>
                        <div class="stat-icon icon-cyan">
                            <i class="fas fa-bell"></i>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="../assets/js/include.js"></script>
    <script src="../assets/js/main.js"></script>
</body>
</html>
