<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân | Import Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/pages/quanLyhosocanhan.css">
</head>
<body>
    <div class="app-shell">
        <div class="sidebar-wrapper" data-include="../components/sidebar.html"></div>
        
        <main class="main">
            <div class="header-wrapper" data-include="../components/header.html"></div>

            <section class="content">
                <h2 class="page-title">Hồ sơ cá nhân</h2>

                <div class="profile-grid">
                    <div class="profile-left">
                        <div class="profile-card">
                            <h3>Thông tin cá nhân</h3>
                            <div class="form-group">
                                <label>Tên</label>
                                <input type="text" value="Admin" readonly class="input-readonly">
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="text" value="admin@bnk.com" readonly class="input-readonly">
                            </div>
                            <button class="btn-primary-profile">Cập nhật thông tin</button>
                        </div>

                        <div class="profile-card">
                            <h3>Đổi mật khẩu</h3>
                            <div class="form-group">
                                <label>Mật khẩu hiện tại</label>
                                <input type="password" placeholder="Mật khẩu hiện tại">
                            </div>
                            <div class="form-group">
                                <label>Mật khẩu mới</label>
                                <input type="password" placeholder="Mật khẩu mới">
                            </div>
                            <div class="form-group">
                                <label>Xác nhận mật khẩu mới</label>
                                <input type="password" placeholder="Xác nhận mật khẩu mới">
                            </div>
                            <button class="btn-primary-profile">Đổi mật khẩu</button>
                        </div>
                    </div>

                    <div class="profile-right">
                        <div class="profile-card avatar-card">
                            <h3>Ảnh đại diện</h3>
                            <div class="avatar-big">
                                <span>AD</span>
                            </div>
                            <button class="btn-primary-profile">Đổi ảnh</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="../assets/js/include.js"></script>
    <script src="../assets/js/main.js"></script>
</body>
</html>
